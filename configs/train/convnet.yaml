device: cuda:0
parallel: False

data:
  train:
    dataset: MNIST
    root: data/
    download: True
    mode: train
  val:
    dataset: MNIST
    root: data/
    download: True
    mode: val

model:
  name: ConvNet
  in_channels: 1
  layers: [8, 16, 32]
  class_num: 10

hyperparameters:
  batch_size: 32
  optim: AdamW
  lr: 0.0001
  loss_fn: cross-entropy
  epochs: 10

save:
  name: convnet_mnist
  weights_path: saved/weights
  loss_path: saved/loss